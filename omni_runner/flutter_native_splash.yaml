# Generate splash: dart run flutter_native_splash:create
#
# Before running, place your splash logo at:
#   assets/icon/splash_logo.png  (centered logo, ~300x300, transparent bg)

flutter_native_splash:
  color: "#2563EB"
  image: "assets/icon/splash_logo.png"

  android_12:
    color: "#2563EB"
    icon_background_color: "#2563EB"
    image: "assets/icon/splash_logo.png"

  ios: true
  android: true
  web: false

  color_dark: "#0F172A"
  image_dark: "assets/icon/splash_logo.png"

  android_12_dark:
    color: "#0F172A"
    icon_background_color: "#0F172A"
    image: "assets/icon/splash_logo.png"
