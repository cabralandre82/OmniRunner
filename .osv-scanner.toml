# Allowlist policy: ONLY ignore advisories that:
#   1. Have an open follow-up finding (e.g. L11-01-followup-next16-upgrade)
#   2. Have a documented justification (transitive dev-only, mitigated, etc)
#   3. Have an `expires` date forcing re-evaluation
#
# Adding entries here REQUIRES a PR comment from a security reviewer (CODEOWNERS).

[[IgnoredVulns]]
# Next.js 14/15 — multiple high-severity advisories cleared in 16.x.
# Follow-up: L11-01-followup-next16-upgrade (separately scoped — major bump
# requires regression test of all routes, middleware, and Sentry/Vercel
# integration). Until then we accept the risk because:
#   - Image Optimizer: not exposed (we don't use remotePatterns).
#   - HTTP smuggling/rewrites: behind Vercel edge which strips ambiguous headers.
#   - Server Components DoS: rate-limited at app layer (L01-20).
