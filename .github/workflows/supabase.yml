name: Supabase CI

on:
  push:
    branches: [master]
    paths:
      - 'supabase/**'
      - 'tools/integration_tests.ts'
      - 'tools/verify_metrics_snapshots.ts'
      - 'tools/perf_benchmark.sql'
      - 'tools/perf_benchmark_ci.sh'
      - 'tools/perf_seed.ts'
      - '.github/workflows/supabase.yml'
  pull_request:
    branches: [master]
    paths:
      - 'supabase/**'
      - 'tools/integration_tests.ts'
      - 'tools/verify_metrics_snapshots.ts'
      - 'tools/perf_benchmark.sql'
      - 'tools/perf_benchmark_ci.sh'
      - 'tools/perf_seed.ts'
      - '.github/workflows/supabase.yml'

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check migration naming convention
        run: |
          errors=0
          for f in supabase/migrations/*.sql; do
            basename=$(basename "$f")
            if ! echo "$basename" | grep -qP '^\d{14}_\w+\.sql$'; then
              echo "ERROR: $basename doesn't follow naming convention"
              errors=$((errors + 1))
            fi
          done
          echo "Checked $(ls supabase/migrations/*.sql | wc -l) migration files"
          exit $errors

  integration-tests:
    name: DB Integration Tests
    runs-on: ubuntu-latest
    needs: validate-migrations
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start -x realtime,storage,imgproxy,edge-runtime,logflare,vector,supavisor

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: portal

      - name: Run integration tests
        run: NODE_PATH=portal/node_modules npx tsx tools/integration_tests.ts
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WO7jMlhUEkSia-H64vRXJvJI3VoLIU1suUts

      - name: Run performance benchmarks
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: |
          NODE_PATH=portal/node_modules npx tsx tools/perf_seed.ts
          ./tools/perf_benchmark_ci.sh

      - name: Stop Supabase
        if: always()
        run: supabase stop

  edge-function-checks:
    name: Edge Function Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - run: npm ci
        working-directory: portal
      - name: Run smoke tests
        run: NODE_PATH=portal/node_modules npx tsx tools/edge_function_smoke_tests.ts
