name: Flutter CI

on:
  push:
    branches: [master]
    paths:
      - 'omni_runner/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [master]
    paths:
      - 'omni_runner/**'
      - '.github/workflows/flutter.yml'

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omni_runner
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: omni_runner
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage --reporter expanded
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: omni_runner/coverage/lcov.info
          retention-days: 14

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    defaults:
      run:
        working-directory: omni_runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK
        id: build-apk
        run: |
          start=$(date +%s)
          flutter build apk --release
          end=$(date +%s)
          echo "build_duration_seconds=$((end - start))" >> $GITHUB_OUTPUT
          echo "Build completed in $((end - start)) seconds"
      - name: APK size check
        id: apk-size-check
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          SIZE_MB=$(echo "scale=2; $(stat -c%s "$APK_PATH") / 1048576" | bc)
          echo "APK size: ${SIZE_MB} MB"
          echo "apk_size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          if (( $(echo "$SIZE_MB > 50" | bc -l) )); then
            echo "ERROR: APK size (${SIZE_MB} MB) exceeds 50 MB limit"
            exit 1
          fi
          echo "APK size check passed (limit: 50 MB)"
      - name: Print build metrics
        run: |
          echo "## Build Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Build duration:** ${{ steps.build-apk.outputs.build_duration_seconds }} seconds" >> $GITHUB_STEP_SUMMARY
          echo "- **APK size:** ${{ steps.apk-size-check.outputs.apk_size_mb }} MB" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v7
        with:
          name: apk-release
          path: omni_runner/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
