name: Flutter CI

on:
  push:
    branches: [master]
    paths:
      - 'omni_runner/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [master]
    paths:
      - 'omni_runner/**'
      - '.github/workflows/flutter.yml'

concurrency:
  group: flutter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omni_runner
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: omni_runner
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter test --coverage --reporter expanded
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: omni_runner/coverage/lcov.info
          retention-days: 14

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    defaults:
      run:
        working-directory: omni_runner
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: omni_runner/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
