name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      notes:
        description: "Release notes (optional)"
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

# L11-09 — least-privilege workflow-level. Release job override para
# adicionar id-token: write (OIDC para Firebase WIF) + contents: write
# (commit/tag/push do version bump) + actions: read (futuro uso de
# attestations). Demais jobs herdam contents: read.
permissions:
  contents: read

jobs:
  release:
    name: Bump, Tag & Build
    runs-on: ubuntu-latest
    # L11-09 — id-token: write habilita GitHub OIDC. Firebase + GCP usam
    # Workload Identity Federation: deploy steps trocam o JWT do GitHub
    # por credencial GCP de curta duração (1h), sem precisar de chave
    # JSON estática. Ver docs/security/CI_SECRETS_AND_OIDC.md.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          cd omni_runner
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD=$(echo "$CURRENT" | cut -d'+' -f2)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_BUILD=$((BUILD + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}+${NEW_BUILD}"

          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "full_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges -20)
          else
            COMMITS=$(git log --oneline --no-merges "${LAST_TAG}..HEAD")
          fi

          {
            echo "## v${{ steps.bump.outputs.version }}"
            echo ""
            if [ -n "${{ inputs.notes }}" ]; then
              echo "${{ inputs.notes }}"
              echo ""
            fi
            echo "$COMMITS" | sed 's/^/- /'
            echo ""
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            cat /tmp/release_notes.md CHANGELOG.md > /tmp/merged_changelog.md
            mv /tmp/merged_changelog.md CHANGELOG.md
          else
            cp /tmp/release_notes.md CHANGELOG.md
          fi

      - name: Commit version bump
        run: |
          git add omni_runner/pubspec.yaml CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin master --tags

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # L11-08 — MUST match the flutter-version pinned in
      # .github/workflows/flutter.yml / security.yml and the
      # `environment.flutter` range in omni_runner/pubspec.yaml
      # (enforced by `npm run audit:flutter-sdk-pinning`). If you
      # bump here, bump all three in the SAME PR + update
      # docs/runbooks/FLUTTER_SDK_PINNING_RUNBOOK.md + .tool-versions.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: omni_runner

      # ─────────────────────────────────────────────────────────────────
      # L01-31 — Restore Android release signing material from secrets.
      #
      # Without this step `flutter build apk --release` would either:
      #   • fail loudly with the L01-31 GradleException (post-fix, the
      #     desired behaviour for any *misconfigured* release run); or
      #   • silently produce a debug-signed APK (pre-fix; this is the
      #     vulnerability the audit flagged).
      #
      # Required repo secrets:
      #   ANDROID_KEYSTORE_BASE64       — base64-encoded .keystore file
      #                                   (`base64 -w0 omnirunner-release.keystore`)
      #   ANDROID_KEY_PROPERTIES        — full text of key.properties
      #                                   (storePassword=…\nkeyPassword=…\n…)
      #
      # If either secret is missing, fail-fast with a pointer to the
      # runbook — the build would fail anyway downstream, but failing
      # here gives a clearer signal than a Gradle stack trace.
      # See docs/runbooks/ANDROID_RELEASE_SIGNING_RUNBOOK.md.
      # ─────────────────────────────────────────────────────────────────
      - name: Restore Android release signing (L01-31)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_PROPERTIES: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || [ -z "${ANDROID_KEY_PROPERTIES:-}" ]; then
            echo "::error title=L01-31::Missing ANDROID_KEYSTORE_BASE64 or ANDROID_KEY_PROPERTIES secret. See docs/runbooks/ANDROID_RELEASE_SIGNING_RUNBOOK.md."
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > omni_runner/android/app/omnirunner-release.keystore
          printf '%s' "${ANDROID_KEY_PROPERTIES}" > omni_runner/android/key.properties
          # Sanity: never echo the secrets, but confirm the files landed
          # with non-zero size and the expected key.properties keys.
          test -s omni_runner/android/app/omnirunner-release.keystore
          test -s omni_runner/android/key.properties
          for required in storePassword keyPassword keyAlias storeFile; do
            grep -q "^${required}=" omni_runner/android/key.properties \
              || { echo "::error title=L01-31::ANDROID_KEY_PROPERTIES missing key '${required}'"; exit 1; }
          done
          chmod 600 omni_runner/android/key.properties omni_runner/android/app/omnirunner-release.keystore
          echo "L01-31: keystore + key.properties restored ($(stat -c '%s' omni_runner/android/app/omnirunner-release.keystore) bytes)."

      - name: Verify gradle release-signing invariants (L01-31)
        run: bash tools/test_l01_31_android_signing.sh

      # L01-30 — Block release builds that ship without R8/ProGuard. Runs
      # immediately after L01-31 so the two structural defences fail fast
      # before Fastlane wastes minutes on a doomed build.
      - name: Verify gradle release-minify invariants (L01-30)
        run: bash tools/test_l01_30_android_minify.sh

      - name: Build release APK
        working-directory: omni_runner
        run: bundle exec fastlane build_apk

      # ─────────────────────────────────────────────────────────────────
      # L01-31 — Always wipe signing material from the runner, even on
      # build failure. The runner is ephemeral but defence-in-depth.
      # ─────────────────────────────────────────────────────────────────
      - name: Cleanup signing material
        if: always()
        run: |
          rm -f omni_runner/android/key.properties
          rm -f omni_runner/android/app/omnirunner-release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          body_path: /tmp/release_notes.md
          files: |
            omni_runner/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false

      # ─────────────────────────────────────────────────────────────────
      # L11-09 — Workload Identity Federation (preferencial)
      #
      # Quando o repo está configurado para WIF (vars GCP_WORKLOAD_IDENTITY_PROVIDER
      # + GCP_SERVICE_ACCOUNT existem), trocamos o JWT do OIDC do GitHub
      # por credencial GCP de curta duração via google-github-actions/auth.
      # Isso elimina:
      #   • PLAY_STORE_KEY_JSON (chave JSON com TTL infinito)
      #   • FIREBASE_TOKEN (token de longa duração)
      # Fallback para o modo "secrets-based" continua se WIF não configurado
      # (ver docs/security/CI_SECRETS_AND_OIDC.md para o setup do WIF).
      # ─────────────────────────────────────────────────────────────────
      - name: Authenticate to GCP via OIDC (WIF)
        id: gcp-auth
        if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s
          # Audience explícito ata o token a este projeto (defesa contra
          # sub-claim-spoofing / repo-jacking).
          audience: ${{ vars.GCP_WORKLOAD_IDENTITY_AUDIENCE }}
          create_credentials_file: true

      - name: Deploy to Google Play (OIDC/WIF)
        if: steps.gcp-auth.conclusion == 'success'
        working-directory: omni_runner
        env:
          # Fastlane lê GOOGLE_APPLICATION_CREDENTIALS automaticamente.
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
        run: bundle exec fastlane deploy_play_store

      - name: Deploy to Firebase App Distribution (OIDC/WIF)
        if: steps.gcp-auth.conclusion == 'success' && vars.FIREBASE_APP_ID != ''
        working-directory: omni_runner
        env:
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          # Fastlane lê GOOGLE_APPLICATION_CREDENTIALS para Firebase também.
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          RELEASE_NOTES: "v${{ steps.bump.outputs.version }}"
        run: bundle exec fastlane deploy_firebase_distribution

      # ─────────────────────────────────────────────────────────────────
      # Fallback secrets-based (DEPRECATED — migrar para WIF)
      # Só executa se WIF NÃO configurado E secrets ainda existem.
      # Roadmap L11-09: remover após cutover comprovado em staging.
      # ─────────────────────────────────────────────────────────────────
      - name: Deploy to Google Play (legacy secrets — DEPRECATED)
        if: steps.gcp-auth.conclusion != 'success' && secrets.PLAY_STORE_KEY_JSON != ''
        working-directory: omni_runner
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.PLAY_STORE_KEY_JSON }}
        run: |
          echo "::warning title=L11-09::Using legacy PLAY_STORE_KEY_JSON. Migrate to WIF (see docs/security/CI_SECRETS_AND_OIDC.md)."
          bundle exec fastlane deploy_play_store

      - name: Deploy to Firebase App Distribution (legacy secrets — DEPRECATED)
        if: steps.gcp-auth.conclusion != 'success' && secrets.FIREBASE_TOKEN != ''
        working-directory: omni_runner
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RELEASE_NOTES: "v${{ steps.bump.outputs.version }}"
        run: |
          echo "::warning title=L11-09::Using legacy FIREBASE_TOKEN. Migrate to WIF (see docs/security/CI_SECRETS_AND_OIDC.md)."
          bundle exec fastlane deploy_firebase_distribution
