name: Portal CI

on:
  push:
    branches: [master]
    paths:
      - 'portal/**'
      - 'tools/load-tests/**'
      - '.github/workflows/portal.yml'
  pull_request:
    branches: [master]
    paths:
      - 'portal/**'
      - 'tools/load-tests/**'
      - '.github/workflows/portal.yml'
  workflow_dispatch:

concurrency:
  group: portal-${{ github.ref }}
  cancel-in-progress: true

# L11-09 — least-privilege GITHUB_TOKEN (default era 'write-all').
# Workflow é apenas quality gate; deploy é via Vercel↔GitHub native.
# Nenhum job precisa escrever no repo. Override por-job se necessário.
permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx tsc --noEmit
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm test -- --reporter verbose --coverage
        env:
          CI: true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: portal-coverage
          path: portal/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # L11-09 — Verificação anti-prod: o secret SUPABASE_SERVICE_ROLE_KEY
      # injetado em CI DEVE ser do projeto de STAGING, jamais do prod.
      # Política está em docs/security/CI_SECRETS_AND_OIDC.md §"Supabase".
      # Se a URL contém o domínio prod conhecido, falhamos imediatamente.
      - name: Assert non-prod Supabase target
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "ERROR: NEXT_PUBLIC_SUPABASE_URL secret unset"
            exit 1
          fi
          # Block conhecidos hosts de produção. Adicionar mais conforme
          # provisionamento (ex: hash específico do projeto prod).
          if echo "${NEXT_PUBLIC_SUPABASE_URL}" | grep -qiE 'omnirunner\.app|prod|production'; then
            echo "ERROR: CI must not target production Supabase. Got: ${NEXT_PUBLIC_SUPABASE_URL}"
            echo "See docs/security/CI_SECRETS_AND_OIDC.md for staging setup."
            exit 1
          fi
          echo "✓ Target appears to be staging/dev: ${NEXT_PUBLIC_SUPABASE_URL}"

      - name: Start portal
        run: |
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Portal ready"
              break
            fi
            sleep 2
          done
        env:
          # L11-09 — secrets DEVEM ser do projeto Supabase staging
          # (rotacionados a cada 90 dias, ver runbook). Validação acima.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          SKIP_VISUAL_REGRESSION: true

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Start portal
        run: |
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Portal ready"
              break
            fi
            sleep 2
          done
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Run visual regression
        run: npx playwright test e2e/visual-regression.spec.ts
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload screenshot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-screenshots
          path: portal/e2e/visual-regression.spec.ts-snapshots/
          retention-days: 7
          if-no-files-found: ignore

  k6-smoke:
    name: k6 Health Smoke
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          K6_VERSION=$(curl -s https://api.github.com/repos/grafana/k6/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -L "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" | tar xz
          sudo mv "k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: portal
      - run: npm run build
        working-directory: portal
      - name: Start portal
        run: |
          (cd portal && npm run start) &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Portal ready"
              exit 0
            fi
            sleep 2
          done
          echo "Portal failed to start"
          exit 1
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Run k6 health smoke
        run: k6 run -e SMOKE=true -e BASE_URL=http://localhost:3000 tools/load-tests/scenarios/api-health.js

  # Deploy é feito pela integração nativa Vercel ↔ GitHub.
  # O Vercel detecta o push no master e publica automaticamente.
  # Este pipeline só serve como quality gate (lint, test, E2E, k6).
